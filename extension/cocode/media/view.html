<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/{{CODE_COMPLETION_STYLESHEET_MAGICAL_STRING}}.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/languages/go.min.js"></script>
  <link href="{{CODEICONS_URI_MAGICAL_STRING}}" rel="stylesheet"/>

  <style>

    body {
        margin: 0;
        padding: 0;
        font-family: var(--vscode-font-family);
        color: var(--vscode-foreground);
        overflow: hidden;
    }

    #setup-page:not(.visible), #answer-page:not(.visible) { display: none }

    /* FOR THE SETUP PAGE */
    #setup-page {
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 6px;
    }

    #setup-page button {
        background: var(--vscode-button-background);
        color: var(--vscode-button-foreground);
        border: none;
        padding: 6px;
        border-radius: 4px;
        cursor: pointer;
        width: 100%;
    }

    #setup-page button:hover {
        background: var(--vscode-button-hoverBackground);
    }

    #session-code-value {
        font-weight: bold;
    }

    /* FOR THE ANSWERS PAGE */
    #answer-page {
        padding: 16px;
        padding-top: 0px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        height: 100vh;
        overflow: hidden;
    }
    button {
        background: var(--vscode-button-background);
        color: var(--vscode-button-foreground);
        border: none;
        padding: 6px;
        border-radius: 4px;
        cursor: pointer;
        width: 100%;
    }
    button:hover {
        background: var(--vscode-button-hoverBackground);
    }

    button:disabled {
        display: none;
    }

    #session-code {
        color: var(--vscode-descriptionForeground);
        font-size: 12px;
    }

    #answer-container {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-top: 10px;
        user-select: none;
        overflow-y: auto;
    }

    .answer {
        position: relative;
        background: var(--vscode-sideBar-background);
        color: var(--vscode-foreground);
        border: 1px solid var(--vscode-widget-border);
        padding: 10px;
        border-radius: 4px;
        cursor: pointer;
        transition: background 0.2s ease, border-color 0.2s ease;
        
    }

    .answer-code {
        font-family: var(--vscode-editor-font-family);
        font-size: var(--vscode-editor-font-size);
        /* Keeps code snippets from wrapping weirdly */
        white-space: pre-wrap; 
        word-break: break-all;
    }

    .answer.chosen {
        background: var(--vscode-list-hoverBackground);
        border-color: var(--vscode-focusBorder);
    }

    .answer-check-icon { 
        display: none
    }

    .answer.chosen .answer-check-icon {
        display: flex;
        align-items: center;
        justify-content: center;
        position: absolute;
        top: 0;
        right: 0;
        padding: 4px;
    }

    .answer-delete-icon {
        display: none;
    }

    .answer:hover .answer-delete-icon {
        display: flex;
        align-items: center;
        justify-content: center;
        position: absolute;
        top: 0;
        left: 0;
        padding: 4px;
    }

    .answer-delete-icon:hover {
        color: var(--vscode-errorForeground);
    }

    .answer:hover {
        background: var(--vscode-list-hoverBackground);
        border-color: var(--vscode-focusBorder);
    }

    .answer:active {
        background: var(--vscode-list-activeSelectionBackground);
        color: var(--vscode-list-activeSelectionForeground);
    }

    .centered {
        width: 100%;
        text-align: center;
        padding-bottom: 12px;
    }

    .centered * {
        padding: 0px;
        margin: 0px;
    }

  </style>
</head>
<body>

  <div id="setup-page" class="visible">
    <p>
        Start a new live coding session to post questions, 
        and receive answers. Students can write answers 
        <a href="{{COCODE_BASE_URL}}">here</a>!
    </p>
    <button id="start-session-btn">Create Session</button>
    <div id="rejoinable-session-code" style="display: none;">
        <p id="rejoinable-session-code-text">Found existing session with code: 
            <span id="rejoinable-session-code-value"></span>
        </p>
        <button id="rejoin-session-btn">Rejoin Session</button>
    </div>
  </div>

  <div id="answer-page">
    <div class="centered">
        <p>Go to</p>
        <h2>{{COCODE_BASE_SHORT_URL}}</h2>
        <div style="height:12px"></div>
        <p>Enter the code</p>
        <h1><a id="session-code-value"></a></h1>
    </div>
    <button id="post-question-btn">Collaborate on selection</button>
    <button id="accept-answer-btn" disabled>Accept suggestion</button>
    <button id="reject-answer-btn">Reject suggestions</button>
    <h2 id="answers-header" style="margin-bottom: 0px">Suggestions: <span id="answer-count">0</span></h2>
    <div id="answer-container"></div>
  </div>

    <template id="answer-template">
        <div class="answer">
            <pre><code class="answer-code"></code></pre>
            <div class="answer-check-icon">
                <i class="codicon codicon-check"></i>
            </div>
            <div class="answer-delete-icon">
                <i class="codicon codicon-trash"></i>
            </div>
        </div>
    </template>

  <script>
    function showPage(pageId) {
      document.getElementById('setup-page').classList.toggle('visible', pageId === 'setup-page');
      document.getElementById('answer-page').classList.toggle('visible', pageId === 'answer-page');
    }

    const vscode = acquireVsCodeApi();
    document.getElementById('start-session-btn')
      .addEventListener('click', () => {
        vscode.postMessage({ command: 'StartSession' });
    });

    document.getElementById('rejoin-session-btn')
      .addEventListener('click', () => {
        vscode.postMessage({ command: 'RejoinSession' });
    });

    let answers = []
    let chosenAnswerId = null
    let currentQuestionLanguage = null;
    updateQuestion(null, null);

    function updateQuestion(id, language) {
      currentQuestionId = id
      currentQuestionLanguage = language 
      document.querySelector('#post-question-btn').disabled = currentQuestionId !== null
      document.querySelector('#accept-answer-btn').disabled = currentQuestionId === null || chosenAnswerId === null
      document.querySelector('#reject-answer-btn').disabled = currentQuestionId === null
      document.querySelector('#answers-header').hidden = currentQuestionId === null
    }

    function updateChosenAnswer(id) {
      chosenAnswerId = id;
      const answerElements = document.querySelectorAll('.answer');
      answerElements.forEach(elm => {
        if (chosenAnswerId !== null && elm.id === `answer-${chosenAnswerId}`) {
          elm.classList.add('chosen');
        } else {
          elm.classList.remove('chosen');
        }
      });
      document.querySelector('#accept-answer-btn').disabled = chosenAnswerId === null
    }

    function chooseAnswer(id) {
      if (chosenAnswerId === id) {
        id = null; // unselect if clicking the already chosen answer
      }
      updateChosenAnswer(id);
      vscode.postMessage({ command: 'chooseAnswer', id })
    }

    window.addEventListener('message', (event) => {
      const { command, ...data } = event.data

      switch (command) {
        case 'showStartSessionPage':
          showPage('setup-page')
          break;

        case 'showAnswerPage':
          showPage('answer-page')

        case 'setRejoinableSessionCode':
          document.getElementById('rejoinable-session-code').style.display = 'block';
          document.getElementById('rejoinable-session-code-value').textContent = data.code;
          break;

        case 'setSessionCode':
          const element = document.getElementById('session-code-value');
          element.textContent = data.code;
          element.href = `{{COCODE_BASE_URL}}/answer?code=${data.code}`;
          break;

        case 'updateQuestion':
          updateQuestion(data.id, data.language)
          break;

        case 'updateAnswers':
          answers = data.answers

          function trimAnswer(text) {
            const lines = text.split('\n')
            const minMargin = lines.map(l => l.length - l.trimStart().length)
                                   .reduce((a, b) => Math.min(a, b))
            return lines.map(l => l.substring(minMargin)).join("\n")
          }

          const elements = data.answers.map(answer => {
            const elm = document.querySelector('#answer-template').content.firstElementChild.cloneNode(true)
            elm.id = `answer-${answer.id}`
            const codeElement = elm.querySelector('.answer-code');
            codeElement.textContent = trimAnswer(answer.text);
            codeElement.classList.add(`language-${currentQuestionLanguage}`);
            elm.addEventListener('click', () => chooseAnswer(answer.id))
            elm.querySelector('.answer-delete-icon').addEventListener('click', (e) => {
              e.stopPropagation(); // prevent triggering the chooseAnswer event
              vscode.postMessage({ command: 'deleteSuggestion', id: answer.id })
            })
            return elm
          })

          const container = document.querySelector('#answer-container')
          container.innerHTML = ""
          elements.forEach(elm => container.appendChild(elm))
          updateChosenAnswer(data.chosenAnswerId);
          hljs.highlightAll();

          const answerCountElement = document.getElementById('answer-count');
          answerCountElement.textContent = data.answers.length.toString();

          break;
      }
    });

    document.getElementById('post-question-btn')
        .addEventListener('click', () => {
      vscode.postMessage({ command: 'postQuestion' });
    });

    document.getElementById('accept-answer-btn')
        .addEventListener('click', () => {
      vscode.postMessage({ command: 'acceptSuggestion' });
    });

    document.getElementById('reject-answer-btn')
        .addEventListener('click', () => {
      vscode.postMessage({ command: 'rejectSuggestions' });
    });


  </script>
</body>
</html>
