
<!DOCTYPE html>
<html lang="en">
<head>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>

<!-- and it's easy to individually load additional languages -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/languages/go.min.js"></script>


<style>
    body {
        padding: 16px;
        padding-top: 0px;
        display: flex;
        flex-direction: column;
        gap: 6px;
    }
    button {
        background: var(--vscode-button-background);
        color: var(--vscode-button-foreground);
        border: none;
        padding: 6px;
        border-radius: 4px;
        cursor: pointer;
        width: 100%;
    }
    button:hover {
        background: var(--vscode-button-hoverBackground);
    }

    button:disabled {
        display: none;
    }

    #session-code {
        color: var(--vscode-descriptionForeground);
        font-size: 12px;
    }

    #answer-container {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-top: 10px;
        user-select: none;
    }

    .answer {
        position: relative;
        background: var(--vscode-sideBar-background);
        color: var(--vscode-foreground);
        border: 1px solid var(--vscode-widget-border);
        padding: 10px;
        border-radius: 4px;
        cursor: pointer;
        transition: background 0.2s ease, border-color 0.2s ease;
        
    }

    .answer-code {
        font-family: var(--vscode-editor-font-family);
        font-size: var(--vscode-editor-font-size);
        /* Keeps code snippets from wrapping weirdly */
        white-space: pre-wrap; 
        word-break: break-all;
    }

    .answer.chosen {
        background: var(--vscode-list-hoverBackground);
        border-color: var(--vscode-focusBorder);
    }

    .answer-check-icon { 
        display: none
    }

    .answer.chosen .answer-check-icon {
        display: flex;
        align-items: center;
        justify-content: center;
        position: absolute;
        top: 0;
        right: 0;
        padding: 4px;
    }

    .answer:hover {
        background: var(--vscode-list-hoverBackground);
        border-color: var(--vscode-focusBorder);
    }

    .answer:active {
        background: var(--vscode-list-activeSelectionBackground);
        color: var(--vscode-list-activeSelectionForeground);
    }

</style>
<link href="{{CODEICONS_URI_MAGICAL_STRING}}" rel="stylesheet"/>
</head>
<body>
    <h2>Session code: <a id="session-code-value"></a></h2>
    <button id="post-question-btn">Post Question</button>

    <h3 style="margin-bottom: 0px">Answers</h3>
    <div id="answer-container"></div>

    <button id="close-question-btn">Close question</button>

    <template id="answer-template">
        <div class="answer">
            <pre><code class="answer-code"></code></pre>
            <div class="answer-check-icon">
                <i class="codicon codicon-check"></i>
            </div>
        </div>
    </template>

<script>
    const vscode = acquireVsCodeApi();

    let answers = []
    let chosenAnswerId = null
    let currentQuestionId = null;
    updateQuestionId(null);

    function updateQuestionId(id) {
        vscode.postMessage({ command: 'debug', msg: JSON.stringify(id) })
        currentQuestionId = id
        document.querySelector('#post-question-btn').disabled = currentQuestionId !== null
        document.querySelector('#close-question-btn').disabled = currentQuestionId === null
        document.querySelector('h3').hidden = currentQuestionId === null
    }

    function chooseAnswer(id) {
        const container = document.querySelector('#answer-container')
        if (chosenAnswerId !== null) {
            const child = Array.from(container.children).find(elm => elm.id === `answer-${chosenAnswerId}`)
            child.classList.remove('chosen')
        }

        if (chosenAnswerId !== id) {
            const child = Array.from(container.children).find(elm => elm.id === `answer-${id}`)
            child.classList.add('chosen')
            chosenAnswerId = id
            vscode.postMessage({ command: 'chooseAnswer', id })
        } else {
            chosenAnswerId = null
            vscode.postMessage({ command: 'chooseAnswer', id: null })
        }
    }

    document.getElementById('post-question-btn')
            .addEventListener('click', () => {
        vscode.postMessage({ command: 'postQuestion' });
    });

    document.getElementById('close-question-btn')
            .addEventListener('click', () => {
        vscode.postMessage({ command: 'closeQuestion' });
    });

    // Listen for label updates from the extension
    window.addEventListener('message', (event) => {
        vscode.postMessage({
            command: 'debug',
            msg: `Got event ${JSON.stringify(event.data)}`
        })

        if (event.data.command === 'setSessionCode') {
            const element = document.getElementById('session-code-value');
            element.textContent = event.data.text;
            element.href = `https://cocode.kasperskov.dev/answer?code=${event.data.text}`;
        } else if (event.data.command === "updateQuestion") {
            updateQuestionId(event.data.id)
        } else if (event.data.command === "updateAnswers") {
            answers = event.data.answers
        
            const elements = event.data.answers.map(answer => {
                const elm = document.querySelector('#answer-template').content.firstElementChild.cloneNode(true)
                elm.id = `answer-${answer.id}`
                elm.querySelector('.answer-code').textContent = answer.text
                elm.addEventListener('click', () => chooseAnswer(answer.id))
                return elm
            })
            
            const container = document.querySelector('#answer-container')
            container.innerHTML = ""
            elements.forEach(elm => container.appendChild(elm))
            hljs.highlightAll();
        }
    });

</script>
</body>
</html>
