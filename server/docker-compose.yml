services:
  web:
    # Replace with your actual GitHub Container Registry path
    image: ghcr.io/logicontainer/cocode:latest 
    container_name: cocode-app
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NODE_ENV=production
    depends_on:
      - db
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  db:
    image: postgres:15-alpine
    container_name: cocode-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Expose port only if you need external DB access, otherwise remove the ports block
    ports:
      - "5433:5432"

  # Optional: Auto-updater
  watchtower:
    image: containrrr/watchtower
    container_name: university-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 3600 --label-enable --cleanup
    # Checks for updates every 1 hour (3600 seconds)

volumes:
  pgdata:
